name: vault_flutter
description: Vault — End-to-end encrypted messenger with Firebase backend.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_messaging: ^14.7.19

  # ── Navigation ────────────────────────────────────────────
  go_router: ^13.2.0

  # ── State management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Crypto ────────────────────────────────────────────────
  pointycastle: ^3.9.1
  encrypt: ^5.0.3

  # ── Secure storage ────────────────────────────────────────
  flutter_secure_storage: ^9.0.0

  # ── Utilities ─────────────────────────────────────────────
  uuid: ^4.3.3
  intl: ^0.19.0

  # ── UI ────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: DMMono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
        - asset: assets/fonts/DMMono-Medium.ttf
          weight: 500
